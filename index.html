<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap');
    :root { --canva-purple: #7d2ae8; --canva-blue: #00c2cb; --bg-soft: #f6f9ff; }
    body { font-family: 'Sarabun', sans-serif; background-color: var(--bg-soft); overflow-x: hidden; }
    
    /* Login Style */
    .login-container { height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--canva-purple), var(--canva-blue)); }
    .login-card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 400px; }
    
    /* Sidebar Style */
    #sidebar { min-width: 250px; max-width: 250px; min-height: 100vh; background: white; transition: all 0.3s; border-right: 1px solid #ddd; }
    .nav-link { color: #333; padding: 12px 20px; margin: 5px 15px; border-radius: 10px; transition: 0.3s; }
    .nav-link:hover, .nav-link.active { background: var(--canva-purple); color: white !important; }
    
    .main-content { width: 100%; padding: 20px; }
    .card-custom { border-radius: 15px; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.3s; }
    .loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: none; justify-content: center; align-items: center; z-index: 9999; }
  </style>
</head>
<body>

<div id="loader" class="loading"><div class="spinner-border text-primary"></div></div>

<!-- Section: Login -->
<div id="loginPage" class="login-container">
  <div class="login-card text-center">
    <img src="https://cdn-icons-png.flaticon.com/512/744/744465.png" width="80" class="mb-3">
    <h4>เข้าสู่ระบบจัดการรถ</h4>
    <p class="text-muted">กรุณาใส่รหัสพนักงานของคุณ</p>
    <input type="number" id="empIdInput" class="form-control mb-3 text-center" placeholder="รหัสพนักงาน">
    <button class="btn btn-primary w-100" style="background: var(--canva-purple); border:none;" onclick="handleLogin()">Login</button>
  </div>
</div>

<!-- Section: Main Application -->
<div id="mainApp" class="d-flex" style="display: none !important;">
  <!-- Sidebar -->
  <nav id="sidebar">
    <div class="p-4 text-center">
      <h5 class="fw-bold" style="color: var(--canva-purple);">NKP VEHICLE</h5>
      <hr>
      <div id="userInfo" class="small fw-bold text-muted"></div>
    </div>
    <ul class="nav flex-column">
      <li class="nav-item"><a class="nav-link active" onclick="showSection('dashboard')"><i class="fas fa-chart-line me-2"></i> Dashboard</a></li>
      <li class="nav-item"><a class="nav-link" onclick="showSection('check')"><i class="fas fa-clipboard-check me-2"></i> เช็คสภาพ</a></li>
      <li class="nav-item"><a class="nav-link" onclick="showSection('request')"><i class="fas fa-car-side me-2"></i> ขอใช้รถ</a></li>
      <li class="nav-item"><a class="nav-link" onclick="showSection('return')"><i class="fas fa-undo me-2"></i> คืนรถ</a></li>
      <li class="nav-item"><a class="nav-link" onclick="showSection('fuel')"><i class="fas fa-gas-pump me-2"></i> เติมน้ำมัน</a></li>
      <li class="nav-item"><a class="nav-link" onclick="showSection('report')"><i class="fas fa-file-invoice me-2"></i> รายงาน</a></li>
    </ul>
  </nav>

  <!-- Main Content -->
  <div class="main-content">
    <div id="dashboardSection" class="section">
      <h3 class="mb-4">Dashboard</h3>
      <div class="row">
        <div class="col-md-4 mb-3"><div class="card card-custom p-4 bg-white"><h6>รถทั้งหมด</h6><h2 class="text-primary">25</h2></div></div>
        <div class="col-md-4 mb-3"><div class="card card-custom p-4 bg-white"><h6>กำลังใช้งาน</h6><h2 class="text-warning">5</h2></div></div>
        <div class="col-md-4 mb-3"><div class="card card-custom p-4 bg-white"><h6>พร้อมใช้</h6><h2 class="text-success">20</h2></div></div>
      </div>
    </div>

    <!-- Dynamic Form Section -->
    <div id="formSection" class="section" style="display:none;">
      <div class="card card-custom p-4">
        <h4 id="formTitle" class="mb-4">ทำรายการ</h4>
        <div class="row g-3">
          <div class="col-md-4">
            <label class="form-label">สังกัด</label>
            <select id="selAffiliation" class="form-select" onchange="filterDept()"></select>
          </div>
          <div class="col-md-4">
            <label class="form-label">แผนก</label>
            <select id="selDept" class="form-select" onchange="filterLicense()"></select>
          </div>
          <div class="col-md-4">
            <label class="form-label">ทะเบียนรถ</label>
            <select id="selLicense" class="form-select" onchange="autoFillVehicle()"></select>
          </div>
          <div class="col-md-6">
            <label class="form-label">ยี่ห้อ</label>
            <input type="text" id="carBrand" class="form-control" readonly>
          </div>
          <div class="col-md-6">
            <label class="form-label">ประเภท</label>
            <input type="text" id="carType" class="form-control" readonly>
          </div>
          <div class="col-12 mt-4 text-center">
            <button class="btn btn-lg btn-success px-5" onclick="submitData()">บันทึกข้อมูล</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  let currentUser = {};
  let vehicleData = [];

  function handleLogin() {
    const id = document.getElementById('empIdInput').value;
    if(!id) return alert('กรุณาระบุรหัสพนักงาน');
    
    toggleLoader(true);
    google.script.run.withSuccessHandler(res => {
      toggleLoader(false);
      if(res.success) {
        currentUser = res.user;
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('mainApp').setAttribute('style', 'display: flex !important');
        document.getElementById('userInfo').innerText = `${currentUser.name}\n(${currentUser.dept})`;
        loadVehicles();
      } else {
        alert(res.message);
      }
    }).loginUser(id);
  }

  function loadVehicles() {
    google.script.run.withSuccessHandler(data => {
      vehicleData = data;
      const affs = [...new Set(data.map(item => item[0]))];
      fillSelect('selAffiliation', affs);
    }).getVehicleData();
  }

  function filterDept() {
    const aff = document.getElementById('selAffiliation').value;
    const depts = [...new Set(vehicleData.filter(v => v[0] === aff).map(v => v[1]))];
    fillSelect('selDept', depts);
  }

  function filterLicense() {
    const aff = document.getElementById('selAffiliation').value;
    const dept = document.getElementById('selDept').value;
    const licenses = vehicleData.filter(v => v[0] === aff && v[1] === dept).map(v => v[2]);
    fillSelect('selLicense', licenses);
  }

  function autoFillVehicle() {
    const lic = document.getElementById('selLicense').value;
    const car = vehicleData.find(v => v[2] === lic);
    if(car) {
      document.getElementById('carBrand').value = car[3];
      document.getElementById('carType').value = car[4];
    }
  }

  function fillSelect(id, items) {
    const el = document.getElementById(id);
    el.innerHTML = '<option value="">เลือก...</option>';
    items.forEach(item => el.innerHTML += `<option value="${item}">${item}</option>`);
  }

  function showSection(name) {
    const sections = ['dashboardSection', 'formSection'];
    const titles = { 'check':'เช็คสภาพ', 'request':'ขอใช้รถ', 'return':'คืนรถ', 'fuel':'เติมน้ำมัน', 'report':'รายงาน' };
    
    if(name === 'dashboard') {
      document.getElementById('dashboardSection').style.display = 'block';
      document.getElementById('formSection').style.display = 'none';
    } else {
      document.getElementById('dashboardSection').style.display = 'none';
      document.getElementById('formSection').style.display = 'block';
      document.getElementById('formTitle').innerText = titles[name];
    }
  }

  function submitData() {
    const data = {
      empId: currentUser.empId,
      userName: currentUser.name,
      type: document.getElementById('formTitle').innerText,
      license: document.getElementById('selLicense').value,
      brand: document.getElementById('carBrand').value
    };
    
    if(!data.license) return alert('กรุณาเลือกทะเบียนรถ');
    
    toggleLoader(true);
    google.script.run.withSuccessHandler(res => {
      toggleLoader(false);
      if(res.success) {
        alert('บันทึกข้อมูลและแจ้งเตือนเรียบร้อย!');
        showSection('dashboard');
      }
    }).processTransaction(data);
  }

  function toggleLoader(show) {
    document.getElementById('loader').style.display = show ? 'flex' : 'none';
  }
</script>
</body>
</html>
