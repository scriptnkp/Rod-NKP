<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f3f4f6; }
        .canva-card { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
        .sidebar-overlay { background: rgba(0,0,0,0.5); }
    </style>
</head>
<body class="text-gray-800">

    <!-- APP SCRIPT URL -->
    <script>
        const API_URL = "YOUR_WEB_APP_URL_HERE"; 
        let currentUser = null;
        let vehicleData = [];
    </script>

    <!-- 1. LOGIN PAGE -->
    <div id="login-page" class="min-h-screen flex items-center justify-center p-4">
        <div class="canva-card p-8 w-full max-w-md text-center">
            <h1 class="text-2xl font-bold mb-2 text-blue-600">ระบบจัดการรถองค์กร</h1>
            <p class="text-gray-500 mb-6">เข้าสู่ระบบด้วยรหัสพนักงาน</p>
            
            <input type="text" id="emp-id-input" placeholder="กรอกรหัสพนักงาน (เช่น 111999)" class="w-full p-3 border border-gray-300 rounded-lg mb-4 focus:outline-none focus:border-blue-500">
            
            <button onclick="login()" id="btn-login" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition">เข้าสู่ระบบ</button>
            <p id="login-msg" class="text-red-500 mt-4 hidden"></p>
        </div>
    </div>

    <!-- 2. MAIN APP CONTAINER -->
    <div id="main-app" class="hidden min-h-screen flex flex-col relative">
        
        <!-- Navbar -->
        <header class="bg-blue-600 text-white p-4 flex justify-between items-center shadow-md relative z-20">
            <div class="flex items-center gap-3">
                <button onclick="toggleMenu()" class="text-2xl focus:outline-none"><i class="fas fa-bars"></i></button>
                <h1 class="text-xl font-bold">Dashboard</h1>
            </div>
            <div class="flex items-center gap-2">
                <i class="fas fa-user-circle text-2xl"></i>
                <span id="user-display-name" class="text-sm font-medium"></span>
            </div>
        </header>

        <!-- Sidebar Menu (Hamburger) -->
        <div id="sidebar-overlay" onclick="toggleMenu()" class="hidden fixed inset-0 sidebar-overlay z-10"></div>
        <div id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-white shadow-xl transform -translate-x-full transition-transform duration-300 z-30 flex flex-col">
            <div class="p-6 bg-blue-50 border-b">
                <h2 class="text-xl font-bold text-blue-800">เมนูหลัก</h2>
            </div>
            <div class="flex-1 overflow-y-auto py-4">
                <a href="#" onclick="showSection('sec-dashboard'); toggleMenu();" class="block px-6 py-3 hover:bg-blue-50 text-gray-700"><i class="fas fa-home w-6"></i> Dashboard</a>
                <a href="#" onclick="showSection('sec-check'); toggleMenu();" class="block px-6 py-3 hover:bg-blue-50 text-gray-700"><i class="fas fa-clipboard-check w-6"></i> เช็คสภาพรถ</a>
                <a href="#" onclick="showSection('sec-request'); toggleMenu();" class="block px-6 py-3 hover:bg-blue-50 text-gray-700"><i class="fas fa-key w-6"></i> ขอใช้รถ</a>
                <a href="#" onclick="showSection('sec-return'); toggleMenu();" class="block px-6 py-3 hover:bg-blue-50 text-gray-700"><i class="fas fa-undo w-6"></i> คืนรถ</a>
                <a href="#" onclick="showSection('sec-fuel'); toggleMenu();" class="block px-6 py-3 hover:bg-blue-50 text-gray-700"><i class="fas fa-gas-pump w-6"></i> เติมน้ำมัน</a>
                <a href="#" onclick="showSection('sec-report'); toggleMenu();" class="block px-6 py-3 hover:bg-blue-50 text-gray-700"><i class="fas fa-chart-line w-6"></i> รายงาน</a>
            </div>
            <div class="p-4 border-t">
                <button onclick="logout()" class="w-full text-left px-2 py-2 text-red-600 font-bold hover:bg-red-50 rounded"><i class="fas fa-sign-out-alt w-6"></i> ออกจากระบบ</button>
            </div>
        </div>

        <!-- Content Area -->
        <main class="flex-1 p-4 md:p-6">
            
            <!-- Dashboard Section -->
            <section id="sec-dashboard" class="content-section">
                <h2 class="text-2xl font-bold mb-4">ยินดีต้อนรับ, <span id="dash-name" class="text-blue-600"></span></h2>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div class="canva-card p-4 text-center border-t-4 border-blue-500">
                        <i class="fas fa-car text-3xl text-blue-500 mb-2"></i>
                        <p class="text-sm text-gray-500">สถานะรถว่าง</p>
                        <h3 class="text-2xl font-bold">12 คัน</h3>
                    </div>
                </div>
            </section>

            <!-- Request Vehicle Section (ขอใช้รถ) -->
            <section id="sec-request" class="content-section hidden">
                <div class="canva-card p-6 max-w-2xl mx-auto">
                    <h2 class="text-2xl font-bold mb-6 text-blue-800 border-b pb-2"><i class="fas fa-key"></i> ฟอร์มขอใช้รถ</h2>
                    
                    <div class="space-y-4">
                        <!-- สังกัด -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">สังกัด</label>
                            <select id="req-dept" class="w-full p-2 border rounded bg-gray-50" onchange="updateDivisions()">
                                <option value="">-- เลือกสังกัด --</option>
                            </select>
                        </div>
                        
                        <!-- แผนก -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">แผนก</label>
                            <select id="req-division" class="w-full p-2 border rounded bg-gray-50" onchange="updatePlates()" disabled>
                                <option value="">-- เลือกแผนก --</option>
                            </select>
                        </div>

                        <!-- ทะเบียน -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">ทะเบียนรถ</label>
                            <select id="req-plate" class="w-full p-2 border rounded bg-gray-50" onchange="updateVehicleDetails()" disabled>
                                <option value="">-- เลือกทะเบียนรถ --</option>
                            </select>
                        </div>

                        <!-- ยี่ห้อ & ประเภท (Auto Fill) -->
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">ยี่ห้อ</label>
                                <input type="text" id="req-brand" class="w-full p-2 border rounded bg-gray-100 text-gray-600" readonly>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">ประเภท</label>
                                <input type="text" id="req-type" class="w-full p-2 border rounded bg-gray-100 text-gray-600" readonly>
                            </div>
                        </div>

                        <button onclick="submitRequest()" class="w-full mt-4 bg-green-600 text-white font-bold py-3 rounded-lg hover:bg-green-700 transition">
                            ยืนยันการขอใช้รถ
                        </button>
                    </div>
                </div>
            </section>

            <!-- Other sections (Placeholder) -->
            <section id="sec-check" class="content-section hidden"><h2 class="text-xl font-bold">ระบบเช็คสภาพรถ (กำลังพัฒนา)</h2></section>
            <section id="sec-return" class="content-section hidden"><h2 class="text-xl font-bold">ระบบคืนรถ (กำลังพัฒนา)</h2></section>
            <section id="sec-fuel" class="content-section hidden"><h2 class="text-xl font-bold">ระบบบันทึกเติมน้ำมัน (กำลังพัฒนา)</h2></section>
            <section id="sec-report" class="content-section hidden"><h2 class="text-xl font-bold">รายงาน (กำลังพัฒนา)</h2></section>

        </main>
    </div>

    <!-- MAIN LOGIC JAVASCRIPT -->
    <script>
        // --------- UI & Navigation Logic ---------
        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if(sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        function showSection(sectionId) {
            document.querySelectorAll('.content-section').forEach(el => el.classList.add('hidden'));
            document.getElementById(sectionId).classList.remove('hidden');
        }

        // --------- Auth Logic ---------
        async function login() {
            const empId = document.getElementById('emp-id-input').value.trim();
            const btn = document.getElementById('btn-login');
            const msg = document.getElementById('login-msg');
            
            if(!empId) return;
            
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> กำลังตรวจสอบ...';
            msg.classList.add('hidden');

            try {
                const response = await fetch(`${API_URL}?action=login&empId=${empId}`);
                const data = await response.json();

                if(data.status === 'success') {
                    currentUser = data.user;
                    initApp();
                } else {
                    msg.innerText = data.message;
                    msg.classList.remove('hidden');
                }
            } catch(e) {
                msg.innerText = "เกิดข้อผิดพลาดในการเชื่อมต่อ";
                msg.classList.remove('hidden');
            }
            btn.innerHTML = 'เข้าสู่ระบบ';
        }

        function logout() {
            currentUser = null;
            document.getElementById('main-app').classList.add('hidden');
            document.getElementById('login-page').classList.remove('hidden');
            document.getElementById('emp-id-input').value = '';
        }

        async function initApp() {
            document.getElementById('login-page').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            
            document.getElementById('user-display-name').innerText = currentUser.name;
            document.getElementById('dash-name').innerText = currentUser.name;
            showSection('sec-dashboard');

            // โหลดข้อมูลรถเมื่อ Login สำเร็จ
            const response = await fetch(`${API_URL}?action=getVehicles`);
            const vData = await response.json();
            if(vData.status === 'success') {
                vehicleData = vData.data;
                populateDept();
            }
        }

        // --------- Dynamic Dropdown Logic ---------
        function populateDept() {
            const depts = [...new Set(vehicleData.map(v => v.dept))];
            const selDept = document.getElementById('req-dept');
            selDept.innerHTML = '<option value="">-- เลือกสังกัด --</option>';
            depts.forEach(d => selDept.innerHTML += `<option value="${d}">${d}</option>`);
        }

        function updateDivisions() {
            const dept = document.getElementById('req-dept').value;
            const selDiv = document.getElementById('req-division');
            const selPlate = document.getElementById('req-plate');
            
            clearVehicleDetails();
            selPlate.innerHTML = '<option value="">-- เลือกทะเบียนรถ --</option>';
            selPlate.disabled = true;

            if(!dept) { selDiv.disabled = true; return; }

            const divs = [...new Set(vehicleData.filter(v => v.dept === dept).map(v => v.division))];
            selDiv.innerHTML = '<option value="">-- เลือกแผนก --</option>';
            divs.forEach(d => selDiv.innerHTML += `<option value="${d}">${d}</option>`);
            selDiv.disabled = false;
        }

        function updatePlates() {
            const dept = document.getElementById('req-dept').value;
            const div = document.getElementById('req-division').value;
            const selPlate = document.getElementById('req-plate');

            clearVehicleDetails();

            if(!div) { selPlate.disabled = true; return; }

            const plates = vehicleData.filter(v => v.dept === dept && v.division === div);
            selPlate.innerHTML = '<option value="">-- เลือกทะเบียนรถ --</option>';
            plates.forEach(p => selPlate.innerHTML += `<option value="${p.plate}">${p.plate}</option>`);
            selPlate.disabled = false;
        }

        function updateVehicleDetails() {
            const plate = document.getElementById('req-plate').value;
            const vehicle = vehicleData.find(v => v.plate === plate);
            
            if(vehicle) {
                document.getElementById('req-brand').value = vehicle.brand;
                document.getElementById('req-type').value = vehicle.type;
            } else {
                clearVehicleDetails();
            }
        }

        function clearVehicleDetails() {
            document.getElementById('req-brand').value = '';
            document.getElementById('req-type').value = '';
        }

        // --------- Submit Logic & Telegram ---------
        async function submitRequest() {
            const plate = document.getElementById('req-plate').value;
            if(!plate) return alert('กรุณาเลือกข้อมูลให้ครบถ้วน');

            const payload = {
                action: 'requestVehicle',
                empId: currentUser.empId,
                name: currentUser.name,
                dept: document.getElementById('req-dept').value,
                division: document.getElementById('req-division').value,
                plate: plate,
                brand: document.getElementById('req-brand').value,
                type: document.getElementById('req-type').value
            };

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                const result = await res.json();
                if(result.status === 'success') {
                    alert('ส่งคำขอสำเร็จ! ระบบได้แจ้งเตือนไปยัง Telegram แล้ว');
                    showSection('sec-dashboard');
                }
            } catch(e) {
                alert('เกิดข้อผิดพลาดในการส่งข้อมูล');
            }
        }
    </script>
</body>
</html>
